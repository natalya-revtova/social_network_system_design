basePath: /api
definitions:
  api.Chat:
    properties:
      avatar_url:
        type: string
      id:
        type: integer
      title:
        type: string
      users_ids:
        items:
          type: integer
        type: array
    type: object
  api.Comment:
    properties:
      created_at:
        type: string
      post_id:
        type: integer
      text:
        type: string
      user_id:
        type: integer
    type: object
  api.ImageInfo:
    properties:
      url:
        type: string
    type: object
  api.Message:
    properties:
      chat_id:
        type: integer
      created_at:
        type: string
      images_urls:
        items:
          type: string
        type: array
      text:
        type: string
      user_id:
        type: integer
    type: object
  api.PaginatedChats:
    properties:
      records:
        items:
          $ref: '#/definitions/api.Chat'
        type: array
      total:
        type: integer
    type: object
  api.PaginatedMessages:
    properties:
      records:
        items:
          $ref: '#/definitions/api.Message'
        type: array
      total:
        type: integer
    type: object
  api.PaginatedPosts:
    properties:
      records:
        items:
          $ref: '#/definitions/api.Post'
        type: array
      total:
        type: integer
    type: object
  api.Post:
    properties:
      created_at:
        type: string
      id:
        type: integer
      images_urls:
        items:
          type: string
        type: array
      location:
        type: string
      text:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  api.PostsTop:
    properties:
      location:
        type: string
    type: object
  api.RestError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  api.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      description:
        type: string
      first_name:
        type: string
      id:
        type: integer
      last_name:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
info:
  contact: {}
  title: Social network for travelers API
  version: "1.0"
paths:
  /v1/chats:
    post:
      consumes:
      - application/json
      parameters:
      - description: Chat object
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.Chat'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.Chat'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/api.RestError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.RestError'
      summary: Create chat
      tags:
