      tags:
      - Chats
    get:
      parameters:
      - description: ID of chat to be retrieved
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      - description: limit
        in: query
        minimum: 1
        name: limit
        type: integer
      - description: offset
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.PaginatedMessages'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.RestError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.RestError'
      summary: Get chat messages
      tags:
      - Chats
    patch:
      consumes:
      - application/json
      parameters:
      - description: ID of chat to be updated
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      - description: Chat object
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.Chat'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Chat'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.RestError'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/api.RestError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.RestError'
      summary: Update chat by ID
      tags:
      - Chats
